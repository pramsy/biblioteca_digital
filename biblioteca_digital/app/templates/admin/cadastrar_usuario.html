{% extends "layout.html" %}
{% block title %}Cadastrar {{ papel_alvo }} - Biblioteca Digital{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-lg border-0">
            <header class="card-header bg-dark text-white p-4 text-center">
                <h1 class="h3 fw-bold mb-0">Novo {{ papel_alvo }}</h1>
            </header>
            <div class="card-body p-5">
                <form action="" method="POST" class="needs-validation" novalidate>
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    
                    <div class="mb-3">
                        <label for="nome" class="form-label fw-bold">Nome Completo <span class="text-danger">*</span></label>
                        <input type="text" name="nome" id="nome" class="form-control" required placeholder="Ex: Maria Oliveira">
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label fw-bold">Email Institucional <span class="text-danger">*</span></label>
                        <input type="email" name="email" id="email" class="form-control" required placeholder="Ex: maria.admin@ifto.edu.br">
                    </div>

                    <div class="mb-4">
                        <label for="senha" class="form-label fw-bold">Senha Temporária <span class="text-danger">*</span></label>
                        <input type="password" name="senha" id="senha" class="form-control" required minlength="6">
                        <div class="form-text">Mínimo de 6 caracteres.</div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold">Finalizar Cadastro</button>
                        <a href="{{ url_for('livro.admin_dashboard') }}" class="btn btn-link text-muted">Cancelar e voltar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    (function () {
        'use strict'
        var forms = document.querySelectorAll('.needs-validation')
        Array.prototype.slice.call(forms).forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }
                form.classList.add('was-validated')
            }, false)
        })
    })()
</script>
{% endblock %}
